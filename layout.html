<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Layout Website Table - Yulinda</title>
  <style>
    table { width: 100%; height: 90vh; border-collapse: collapse; font-family: sans-serif; }
    td { border: 2px solid #ffffff; text-align: center; }
    .header { background: #a14f78; color: white; height: 100px; }
    .sidebar { background: #ffd1dc; width: 25%; color: #a14f78; vertical-align: top; padding-top: 20px; }
    .main { background: #fffafa; vertical-align: top; padding: 40px; }
    .footer { background: #333; color: white; height: 50px; }
    .back-btn { background: #a14f78; color: white; padding: 10px; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>

  <table>
    <tr>
      <td colspan="2" class="header">
        <h1>WEBSITE HEADER YULINDA</h1>
      </td>
    </tr>
    <tr>
      <td class="sidebar">
        <h3>Navigasi Samping</h3>
        <p>Profil Utama</p>
        <p>Pendidikan</p>
        <p>Keahlian</p>
      </td>
      <td class="main">
        <h2>Main Content Area</h2>
        <p>Ini adalah area utama halaman layout menggunakan tag table.</p>
        <br>
        <a href="index.html" class="back-btn">Kembali ke Beranda</a>
      </td>
    </tr>
    <tr>
      <td colspan="2" class="footer">
        <p>© 2026 Layout Design by Ni Putu Yulinda Apsari</p>
      </td>
    </tr>
  </table>

</body>
</html>
